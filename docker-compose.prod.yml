# Single-node prod profile (Docker) — Rust bridge + prod config
# Usage:
#   $env:JWT_SECRET="<random>"; $env:RPC_API_KEYS="<key>"; $env:BRIDGE_ORACLE_SECRET="<random>"
#   docker compose -f docker-compose.prod.yml up --build
#   curl http://localhost:8080/bridge

services:
  node:
    build:
      context: .
      dockerfile: Dockerfile.prod
    hostname: abs-prod
    ports:
      - "8545:8545"
      - "8080:8080"
      - "5000:5000"
      - "8766:8766"
    environment:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      NODE_ID: docker-prod-1
      DEPLOYMENT_MODE: prod
      CHAIN_ID: "77777"
      HTTP_HOST: "0.0.0.0"
      RPC_HOST: "0.0.0.0"
      WS_HOST: "0.0.0.0"
      P2P_HOST: "0.0.0.0"
      BRIDGE_MODE: rust
      RUST_BRIDGE_PATH: bridge/abs_bridge_bin
      BRIDGE_AUTO_CONFIRM_SEC: "0"
      BRIDGE_REQUIRE_L1_PROOF: "true"
      ETH_RPC_URL: ${ETH_RPC_URL:?set ETH_RPC_URL before starting prod bridge}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET before starting prod}
      RPC_API_KEYS: ${RPC_API_KEYS:?set RPC_API_KEYS before starting prod}
      BRIDGE_ORACLE_SECRET: ${BRIDGE_ORACLE_SECRET:?set BRIDGE_ORACLE_SECRET before starting prod}
      RPC_API_KEY_REQUIRED: "true"
      JWT_ENFORCE_ADMIN: "true"
      REQUIRE_WALLET_FILE: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS before starting prod}
      RATE_LIMIT_RPM: "120"
    volumes:
      - abs-prod-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/live', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    networks:
      - abs-prod

volumes:
  abs-prod-data:

networks:
  abs-prod:
    driver: bridge
