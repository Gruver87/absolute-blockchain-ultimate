# Two-node Absolute Devnet (Docker) — mirrors scripts/start_two_nodes.ps1
# Usage:
#   docker compose -f docker-compose.devnet.yml up --build
#   curl http://localhost:8080/status
#   curl http://localhost:8081/status

services:
  node1:
    build: .
    hostname: node1
    command: ["python", "main.py", "--config", "docker/node1.json"]
    ports:
      - "8545:8545"
      - "8080:8080"
      - "5000:5000"
      - "8766:8766"
    environment:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      NODE_ID: docker-node-1
      DEPLOYMENT_MODE: dev
      CHAIN_ID: "77777"
      RATE_LIMIT_RPM: "0"
    volumes:
      - abs-node1-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/live', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    networks:
      - abs-devnet

  node2-db-seed:
    image: alpine:3.20
    volumes:
      - abs-node1-data:/seed-from:ro
      - abs-node2-data:/seed-to
      - ./scripts/docker_seed_node2_db.sh:/seed.sh:ro
    environment:
      SKIP_DB_SEED: ${SKIP_DB_SEED:-0}
    depends_on:
      node1:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/seed.sh"]
    restart: "no"
    networks:
      - abs-devnet

  node2:
    build: .
    hostname: node2
    command: ["python", "main.py", "--config", "docker/node2.json"]
    ports:
      - "8546:8545"
      - "8081:8080"
      - "5001:5000"
      - "8767:8766"
    environment:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      NODE_ID: docker-node-2
      DEPLOYMENT_MODE: dev
      CHAIN_ID: "77777"
      BOOTSTRAP_PEERS: node1:5000
      RATE_LIMIT_RPM: "0"
    volumes:
      - abs-node2-data:/app/data
    depends_on:
      node2-db-seed:
        condition: service_completed_successfully
      node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/live', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    networks:
      - abs-devnet

volumes:
  abs-node1-data:
  abs-node2-data:

networks:
  abs-devnet:
    driver: bridge
