# ============================================================================
# DOCKER-COMPOSE.YML
# ============================================================================
# Сохрани как docker-compose.yml

version: '3.8'

services:
  # Основной узел блокчейна
  blockchain-node:
    build: .
    container_name: absolute-blockchain-node
    ports:
      - "8080:8080"   # API
      - "8081:8081"   # Extended API
      - "5000:5000"   # P2P
      - "5001:5001"   # P2P Slave 1
      - "5002:5002"   # P2P Slave 2
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./nft_images:/app/nft_images
    environment:
      - API_PORT=8080
      - P2P_PORT=5000
      - DEBUG=false
      - LOG_LEVEL=INFO
    restart: unless-stopped
    networks:
      - blockchain-net

  # FastAPI сервер (опционально)
  fastapi-server:
    build: .
    container_name: absolute-fastapi
    command: python fastapi_server.py
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - API_PORT=8000
      - DEBUG=false
    depends_on:
      - blockchain-node
    restart: unless-stopped
    networks:
      - blockchain-net

  # WebSocket сервер
  websocket-server:
    build: .
    container_name: absolute-websocket
    command: python websocket_server.py
    ports:
      - "8082:8082"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - blockchain-node
    restart: unless-stopped
    networks:
      - blockchain-net

  # PostgreSQL для метаданных
  postgres:
    image: postgres:15
    container_name: absolute-postgres
    environment:
      - POSTGRES_USER=absolute
      - POSTGRES_PASSWORD=absolute123
      - POSTGRES_DB=absolute_blockchain
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - blockchain-net

  # Redis для кэша и очередей
  redis:
    image: redis:7-alpine
    container_name: absolute-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - blockchain-net

  # Prometheus для метрик
  prometheus:
    image: prom/prometheus:latest
    container_name: absolute-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - blockchain-net

  # Grafana для дашбордов
  grafana:
    image: grafana/grafana:latest
    container_name: absolute-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - blockchain-net

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: absolute-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - blockchain-node
      - fastapi-server
      - websocket-server
    restart: unless-stopped
    networks:
      - blockchain-net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  blockchain-net:
    driver: bridge
