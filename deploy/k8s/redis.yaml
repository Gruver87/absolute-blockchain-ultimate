apiVersion: apps/v1
kind: Deployment
metadata:
  name: abs-redis
  namespace: absolute-chain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: abs-redis
  template:
    metadata:
      labels:
        app: abs-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: abs-redis
  namespace: absolute-chain
spec:
  selector:
    app: abs-redis
  ports:
    - port: 6379
      targetPort: 6379
