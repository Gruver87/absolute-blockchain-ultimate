apiVersion: v1
kind: Secret
metadata:
  name: abs-node-secrets
  namespace: absolute-chain
type: Opaque
stringData:
  JWT_SECRET: "your_jwt_secret_here"
  RPC_API_KEYS: "your_generated_rpc_key_here"
  BRIDGE_ORACLE_SECRET: "your_bridge_oracle_secret_here"
  ETH_RPC_URL: "your_ethereum_rpc_url_here"
