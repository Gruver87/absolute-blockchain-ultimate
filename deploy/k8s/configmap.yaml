apiVersion: v1
kind: ConfigMap
metadata:
  name: abs-node-config
  namespace: absolute-chain
data:
  DEPLOYMENT_MODE: "staging"
  HTTP_PORT: "8080"
  RPC_PORT: "8545"
  P2P_PORT: "5000"
  WS_PORT: "8766"
  HTTP_HOST: "0.0.0.0"
  RPC_HOST: "0.0.0.0"
  P2P_HOST: "0.0.0.0"
  WS_HOST: "0.0.0.0"
  DATA_DIR: "/app/data"
  METRICS_ENABLED: "true"
  REDIS_RATE_LIMIT: "true"
  REDIS_URL: "redis://abs-redis:6379/0"
  RATE_LIMIT_RPM: "120"
  # Подключение к seed-ноде (pod-0) для остальных реплик
  BOOTSTRAP_PEERS: "abs-node-0.abs-p2p.absolute-chain.svc.cluster.local:5000"
  CORS_ORIGINS: "https://explorer.example.com"
  ENABLE_CORS_RPC_PROXY: "false"
  JWT_ENFORCE_ADMIN: "true"
  RPC_API_KEY_REQUIRED: "true"
  BRIDGE_MODE: "rust"
  RUST_BRIDGE_PATH: "bridge/abs_bridge_bin"
  BRIDGE_AUTO_CONFIRM_SEC: "0"
  BRIDGE_REQUIRE_L1_PROOF: "true"
