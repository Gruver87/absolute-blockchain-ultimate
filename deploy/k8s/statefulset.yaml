apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: abs-node
  namespace: absolute-chain
spec:
  serviceName: abs-p2p
  replicas: 3
  selector:
    matchLabels:
      app: abs-node
  template:
    metadata:
      labels:
        app: abs-node
    spec:
      containers:
        - name: node
          image: absolute-blockchain:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: rpc
              containerPort: 8545
            - name: p2p
              containerPort: 5000
            - name: ws
              containerPort: 8766
          envFrom:
            - configMapRef:
                name: abs-node-config
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
