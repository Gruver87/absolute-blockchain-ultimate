<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
    <defs>
        <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1a1a2e" stop-opacity="1" />
            <stop offset="100%" stop-color="#0f0c29" stop-opacity="1" />
        </radialGradient>
        <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#DEB887" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#DEB887" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD700" />
            <stop offset="50%" stop-color="#FFA500" />
            <stop offset="100%" stop-color="#FFD700" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <rect width="800" height="800" fill="url(#bgGrad)"/>
    <circle cx="400" cy="400" r="350" fill="url(#glowGrad)" opacity="0.3"/>
    
    <rect x="20" y="20" width="760" height="760" rx="20" ry="20" fill="none" stroke="#CD853F" stroke-width="4" opacity="0.8"/>
    
    <rect x="20" y="20" width="50" height="50" rx="10" ry="10" fill="#CD853F" opacity="0.6"/>
    <rect x="730" y="20" width="50" height="50" rx="10" ry="10" fill="#CD853F" opacity="0.6"/>
    <rect x="20" y="730" width="50" height="50" rx="10" ry="10" fill="#CD853F" opacity="0.6"/>
    <rect x="730" y="730" width="50" height="50" rx="10" ry="10" fill="#CD853F" opacity="0.6"/>
    
    <text x="400" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#CD853F" filter="url(#glow)">Ancient Artifact - Печать Врем</text>
    
    <g transform="translate(400,380)">
        <circle cx="0" cy="0" r="120" fill="none" stroke="#CD853F" stroke-width="8" filter="url(#glow)"/>
        <text x="0" y="10" text-anchor="middle" font-family="Arial" font-size="80" font-weight="bold" fill="#CD853F">★</text>
    </g>
    
    <text x="400" y="720" text-anchor="middle" font-family="Arial" font-size="20" fill="white">Редкость: EPIC</text>
    <text x="400" y="755" text-anchor="middle" font-family="Arial" font-size="18" fill="#CD853F">Сила: 55</text>
</svg>