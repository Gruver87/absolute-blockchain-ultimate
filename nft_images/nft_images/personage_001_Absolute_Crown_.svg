<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
    <defs>
        <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#4a0000" stop-opacity="1" />
            <stop offset="100%" stop-color="#1a0000" stop-opacity="1" />
        </radialGradient>
        <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FF4500" stop-opacity="0.6" />
            <stop offset="100%" stop-color="#FF4500" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="charGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFD700" />
            <stop offset="100%" stop-color="#FF4500" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="10" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <rect width="800" height="800" fill="url(#bgGrad)"/>
    <circle cx="400" cy="400" r="300" fill="url(#glowGrad)"/>
    
    <!-- Рамка -->
    <rect x="20" y="20" width="760" height="760" rx="30" ry="30" fill="none" stroke="#FFD700" stroke-width="5" opacity="0.8"/>
    
    <!-- Углы с символами -->
    <text x="45" y="55" text-anchor="middle" font-size="30" fill="#FFD700">👑</text>
    <text x="755" y="55" text-anchor="middle" font-size="30" fill="#FFD700">👑</text>
    <text x="45" y="775" text-anchor="middle" font-size="30" fill="#FFD700">👑</text>
    <text x="755" y="775" text-anchor="middle" font-size="30" fill="#FFD700">👑</text>
    
    <!-- Название -->
    <text x="400" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFD700" filter="url(#glow)">Absolute Crown - Корона Основателя</text>
    
    <!-- УНИКАЛЬНЫЙ 3D ПЕРСОНАЖ -->
    <g transform="translate(400,380)">
        <!-- Тело персонажа -->
        <ellipse cx="0" cy="20" rx="80" ry="100" fill="url(#charGrad)" opacity="0.9"/>
        
        <!-- Голова -->
        <circle cx="0" cy="-80" r="60" fill="url(#charGrad)" filter="url(#glow)"/>
        
        <!-- Глаза -->
        <circle cx="-20" cy="-95" r="12" fill="white"/>
        <circle cx="20" cy="-95" r="12" fill="white"/>
        <circle cx="-17" cy="-93" r="6" fill="#000"/>
        <circle cx="23" cy="-93" r="6" fill="#000"/>
        
        <!-- Символ на груди -->
        <text x="0" y="25" text-anchor="middle" font-size="50" fill="white" filter="url(#glow)">👑</text>
        
        <!-- Крылья/накидка в зависимости от редкости -->
        <path d="M -80,0 Q -120,-40 -60,-100 Q -30,-60 -80,0" fill="#FFD700" opacity="0.5"/>
        <path d="M 80,0 Q 120,-40 60,-100 Q 30,-60 80,0" fill="#FFD700" opacity="0.5"/>
    </g>
    
    <!-- Информация о персонаже -->
    <text x="400" y="650" text-anchor="middle" font-family="Arial" font-size="22" fill="#aaa">Форма: КОРОНА</text>
    <text x="400" y="685" text-anchor="middle" font-family="Arial" font-size="20" fill="#FFD700">Тело: ROYAL</text>
    
    <!-- Редкость и сила -->
    <rect x="250" y="710" width="300" height="45" rx="10" ry="10" fill="none" stroke="#FFD700" stroke-width="2"/>
    <text x="400" y="740" text-anchor="middle" font-family="Arial" font-size="18" fill="white">Редкость: MYTHIC | Сила: 100</text>
    
    <!-- Подпись -->
    <text x="400" y="785" text-anchor="middle" font-family="Arial" font-size="14" fill="#555">Absolute Blockchain • 2025</text>
</svg>