<!DOCTYPE html>
<html>
<head>
    <title>Absolute Blockchain Explorer</title>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="3">
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #0f0; padding: 20px; }
        h1 { color: #0f0; text-align: center; }
        .online { background: #0a3a0a; border: 1px solid #0f0; padding: 10px; margin: 10px 0; text-align: center; }
        .offline { background: #3a0a0a; border: 1px solid #f00; padding: 10px; margin: 10px 0; text-align: center; }
        .block { border: 1px solid #0f0; margin: 10px 0; padding: 10px; border-radius: 5px; }
        .info { display: inline-block; margin: 5px; padding: 5px 10px; background: #1a1a1a; border-radius: 5px; }
        button { background: #0a0a0a; color: #0f0; border: 1px solid #0f0; padding: 10px; cursor: pointer; }
        .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <h1>🔗 Absolute Blockchain Explorer</h1>
    <div id="status" class="offline">🔄 Connecting...</div>
    <div class="info">📦 Height: <span id="height">?</span></div>
    <div class="info">🔗 Chain ID: <span id="chainId">1337</span></div>
    <div class="info">⛏️ Mining: Active (15s)</div>
    <button onclick="refresh()">🔄 Refresh</button>
    <hr>
    <div id="blocks">Loading blocks...</div>
    <div class="footer">Absolute Blockchain Ultimate | RPC: 8545</div>

    <script>
        const RPC_URL = 'http://localhost:8545';
        
        async function rpcCall(method, params=[]) {
            try {
                const res = await fetch(RPC_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({jsonrpc: '2.0', method, params, id: 1})
                });
                const data = await res.json();
                return data.result;
            } catch(e) {
                console.error('RPC call failed:', e);
                return null;
            }
        }
        
        async function refresh() {
            try {
                const heightHex = await rpcCall('eth_blockNumber');
                if (heightHex) {
                    const height = parseInt(heightHex, 16);
                    document.getElementById('status').innerHTML = '✅ Connected to node (RPC: 8545)';
                    document.getElementById('status').className = 'online';
                    document.getElementById('height').innerText = height;
                    
                    let html = '';
                    const start = Math.max(0, height - 9);
                    for (let i = height; i >= start; i--) {
                        const block = await rpcCall('eth_getBlockByNumber', ['0x' + i.toString(16), true]);
                        if (block) {
                            const blockNum = parseInt(block.number, 16);
                            const hash = block.hash ? block.hash.substring(0, 30) : 'N/A';
                            const miner = block.miner ? block.miner.substring(0, 25) : 'Unknown';
                            const txCount = block.transactions?.length || 0;
                            html += `<div class="block">
                                <b>🔷 Block #${blockNum}</b>
                                <div>Hash: ${hash}...</div>
                                <div>Miner: ${miner}...</div>
                                <div>📝 Transactions: ${txCount}</div>
                            </div>`;
                        }
                    }
                    document.getElementById('blocks').innerHTML = html || '<p>No blocks found</p>';
                } else {
                    throw new Error('No response');
                }
            } catch(e) {
                document.getElementById('status').innerHTML = '❌ Node offline - Make sure node is running';
                document.getElementById('status').className = 'offline';
                document.getElementById('blocks').innerHTML = '<p>Cannot connect to node. Run: python node_persistent.py</p>';
                document.getElementById('height').innerText = '?';
            }
        }
        
        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
